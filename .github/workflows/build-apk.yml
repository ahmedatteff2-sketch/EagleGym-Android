name: Build APK

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build debug + release APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug --no-daemon --stacktrace

      - name: Build release APK (unsigned)
        run: ./gradlew :app:assembleRelease --no-daemon --stacktrace

      - name: Sign release APK
        id: sign_release
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          set -e
          UNSIGNED="app/build/outputs/apk/release/app-release-unsigned.apk"
          OUT="app/build/outputs/apk/release/app-release.apk"
          BUILD_TOOLS_DIR="$(ls -d $ANDROID_HOME/build-tools/* | sort -V | tail -n1)"
          ZIPALIGN="$BUILD_TOOLS_DIR/zipalign"
          APKSIGNER="$BUILD_TOOLS_DIR/apksigner"

          if [ -n "$KEYSTORE_BASE64" ] && [ -n "$KEYSTORE_PASSWORD" ] && [ -n "$KEY_ALIAS" ] && [ -n "$KEY_PASSWORD" ]; then
            echo "Signing release APK with provided keystore..."
            echo "$KEYSTORE_BASE64" | base64 -d > /tmp/release.jks
            "$ZIPALIGN" -p 4 "$UNSIGNED" "${UNSIGNED%.apk}-aligned.apk"
            "$APKSIGNER" sign \
              --ks /tmp/release.jks \
              --ks-key-alias "$KEY_ALIAS" \
              --ks-pass pass:"$KEYSTORE_PASSWORD" \
              --key-pass pass:"$KEY_PASSWORD" \
              --out "$OUT" \
              "${UNSIGNED%.apk}-aligned.apk"
            rm -f /tmp/release.jks
            echo "signed=true" >> "$GITHUB_OUTPUT"
          else
            echo "No keystore secrets configured — generating an ad-hoc keystore so the APK is installable."
            echo "Set KEYSTORE_BASE64 / KEYSTORE_PASSWORD / KEY_ALIAS / KEY_PASSWORD repo secrets to use a stable signing key."
            keytool -genkeypair -v \
              -keystore /tmp/release.jks \
              -alias eagle-gym \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass changeit -keypass changeit \
              -dname "CN=Eagle Gym, OU=Eagle Gym, O=Eagle Gym, L=Cairo, ST=Cairo, C=EG"
            "$ZIPALIGN" -p 4 "$UNSIGNED" "${UNSIGNED%.apk}-aligned.apk"
            "$APKSIGNER" sign \
              --ks /tmp/release.jks \
              --ks-key-alias eagle-gym \
              --ks-pass pass:changeit \
              --key-pass pass:changeit \
              --out "$OUT" \
              "${UNSIGNED%.apk}-aligned.apk"
            rm -f /tmp/release.jks
            echo "signed=adhoc" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: EagleGym-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: EagleGym-release-apk
          path: app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error

      - name: Create GitHub Release on tag push
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app/build/outputs/apk/release/app-release.apk
            app/build/outputs/apk/debug/app-debug.apk
          generate_release_notes: true
